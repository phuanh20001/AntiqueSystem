        </div>
        <div class="form-group" style="margin-bottom:4px;">

        <div class="modal-actions">

          <button class="btn-sm btn-reject"  onclick="submitReview('rejected')">✕ Reject</button>

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderSidebar(config) {
      return `
        <div class="dashboard-sidebar">
          <div class="sidebar-profile">
            <div class="sidebar-name">${escapeHtml(config.sidebar.name)}</div>
            <div class="sidebar-role">${escapeHtml(config.sidebar.role)}</div>
          </div>
          ${config.sidebar.sections.map(section => `
            <div class="sidebar-section-label">${escapeHtml(section.label)}</div>
            <div class="sidebar-section">
              ${section.items.map(item => `
                <a class="sidebar-item${item.active ? ' active' : ''}" href="#">
                  <span>${item.icon}</span> ${escapeHtml(item.label)}
                  ${item.count ? `<span class="sidebar-count${item.countClass ? ' ' + item.countClass : ''}">${escapeHtml(item.count)}</span>` : ''}
                </a>
              `).join('')}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderStats(stats) {
      return `
        <div class="dash-stats">
          ${stats.map(stat => `
            <div class="dash-stat">
              <div class="dash-stat-num${stat.className ? ' ' + stat.className : ''}">${escapeHtml(stat.value)}</div>
              <div class="dash-stat-label">${escapeHtml(stat.label)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderDashboard(session) {
      const config = DASHBOARD_CONFIG[session.role] || DASHBOARD_CONFIG.verifier;
      document.title = config.title + ' — AntiqChain';

      const root = document.getElementById('dashboard-root');
      root.innerHTML = `
        ${renderSidebar(config)}
        <div class="dashboard-main">
          <div class="dash-topbar">
            <div>
              <h2>${escapeHtml(config.title)}</h2>
              <p>${escapeHtml(config.subtitle)}</p>
            </div>
            ${config.actionHref
              ? `<a class="btn-primary" style="font-size:13px;padding:10px 20px;" href="${config.actionHref}">${escapeHtml(config.actionLabel)}</a>`
              : `<button class="btn-primary" style="font-size:13px;padding:10px 20px;" onclick="showToast('${config.actionToast}')">${escapeHtml(config.actionLabel)}</button>`}
          </div>
          ${renderStats(config.stats)}
          ${config.main()}
        </div>
      `;

      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', function (e) {
          e.preventDefault();
          document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    function showWelcomeBanner(session) {
      const banner = document.getElementById('welcome-banner');
      const title = document.getElementById('welcome-banner-title');
      const identity = session.email || session.displayName || 'user';

      title.textContent = 'Welcome, ' + identity;
      banner.style.display = 'block';

      // Trigger entrance transition after initial paint.
      requestAnimationFrame(function () {
        banner.classList.add('show');
      });

      // Auto-hide after a short delay while preserving the exit animation.
      setTimeout(function () {
        banner.classList.remove('show');
        setTimeout(function () {
          banner.style.display = 'none';
        }, 350);
      }, 4200);
    }

    function openReview(itemName) {
      document.getElementById('modal-item-name').textContent = 'Review: ' + itemName;
      document.getElementById('modal-decision').value = '';
      document.getElementById('modal-notes').value = '';
      document.getElementById('score-num').textContent = '75';
      document.getElementById('review-modal').classList.add('open');
    }

    function closeReview() {
      document.getElementById('review-modal').classList.remove('open');
    }

    function submitReview(decision) {
      const notes = document.getElementById('modal-notes').value.trim();
      if (!notes) {
        showToast('Please provide expert notes before submitting.', true);
        return;
      }
      closeReview();
      if (decision === 'approved') {
        showToast('Item approved — generating blockchain hash and sealing record…');
      } else {
        showToast('Item rejected — collector has been notified.');
      }
    }

    document.getElementById('review-modal').addEventListener('click', function (e) {
      if (e.target === this) closeReview();
    });

    const session = requireDashboardSession();
    if (session) {
      renderDashboard(session);
      showWelcomeBanner(session);
    }
