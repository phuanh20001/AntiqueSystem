<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AntiqChain</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <nav>
    <a class="nav-logo" href="../index.html">AntiqChain <span>— Verified Heritage</span></a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="about.html">About</a>
      <a href="submit.html">Submit Item</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="login.html" class="nav-cta">Sign In</a>
    </div>
  </nav>

  <div class="welcome-banner" id="welcome-banner" style="display:none;">
    <div class="welcome-banner-title" id="welcome-banner-title"></div>
  </div>

  <div class="dashboard-layout" id="dashboard-root">
    <div style="padding: 40px;">Loading dashboard data...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>

  <script>
    const session = requireDashboardSession();
    let dashboardRefreshTimer = null;
    let dashboardCurrentRole = null;
    const dashboardState = {
      user: null,
      items: [],
      pendingUsers: [],
      approvedUsers: [],
      activeView: null,
      welcomeShown: false,
    };

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeRole(role) {
      const raw = String(role || '').toLowerCase().trim();
      if (raw === 'user' || raw === 'collector') return 'collector';
      if (raw === 'verifier') return 'verifier';
      if (raw === 'admin') return 'admin';
      return 'collector';
    }

    function getStatusBadge(status) {
      const safeStatus = status || 'Pending';
      const lower = String(safeStatus).toLowerCase();

      let badgeClass = 'badge-pending';
      if (lower.includes('verified') || lower.includes('approved')) badgeClass = 'badge-verified';
      if (lower.includes('rejected')) badgeClass = 'badge-rejected';

      return `<span class="badge ${badgeClass}">${escapeHtml(safeStatus)}</span>`;
    }

    function getHealthBadge(health) {
      if (!health) {
        return '<span class="backend-health-pill backend-health-unknown">Checking backend...</span>';
      }

      if (health.status === 'ok') {
        return `<span class="backend-health-pill backend-health-ok">Live · ${escapeHtml(health.mongo)} · ${escapeHtml(health.blockchain)}</span>`;
      }

      return `<span class="backend-health-pill backend-health-degraded">Degraded · ${escapeHtml(health.mongo)} · ${escapeHtml(health.blockchain)}</span>`;
    }

    function showWelcomeBanner(user) {
      const banner = document.getElementById('welcome-banner');
      const title = document.getElementById('welcome-banner-title');
      const name = user.username || user.displayName || user.firstName || user.email || 'user';

      title.textContent = 'Welcome, ' + name;
      banner.style.display = 'block';
      requestAnimationFrame(function () { banner.classList.add('show'); });

      setTimeout(function () {
        banner.classList.remove('show');
        setTimeout(function () { banner.style.display = 'none'; }, 350);
      }, 3600);
    }

    function renderLoading() {
      document.getElementById('dashboard-root').innerHTML = `
        <div class="dashboard-main" style="width:100%; padding:40px;">
          <div class="dashboard-panel"><div class="panel-body"><p>Loading dashboard data...</p></div></div>
        </div>
      `;
    }

    function renderError(message) {
      document.getElementById('dashboard-root').innerHTML = `
        <div class="dashboard-main" style="width:100%; padding:40px;">
          <div class="dashboard-panel">
            <div class="panel-head"><div><h3>Unable to load dashboard</h3><p>${escapeHtml(message || 'Please try again later.')}</p></div></div>
            <div class="panel-body"><button class="btn-sm btn-review" onclick="loadDashboardData()">Retry</button></div>
          </div>
        </div>
      `;
    }

    function countByStatus(items, statuses) {
      return items.filter((item) => {
        const value = String(item.verificationStatus || item.status || '').toLowerCase();
        return statuses.includes(value);
      }).length;
    }

    function normalizeItems(response) {
      if (Array.isArray(response)) return response;
      if (Array.isArray(response.items)) return response.items;
      if (Array.isArray(response.data)) return response.data;
      return [];
    }

    function normalizeUsers(response) {
      if (Array.isArray(response)) return response;
      if (Array.isArray(response.users)) return response.users;
      if (Array.isArray(response.data)) return response.data;
      return [];
    }

    function buildAdminAnalytics(items, pendingUsers, approvedUsers) {
      const pendingItems = countByStatus(items, ['pending', 'in_progress']);
      const verifiedItems = countByStatus(items, ['verified']);
      const rejectedItems = countByStatus(items, ['rejected']);

      return [
        { label: 'Active Users', value: approvedUsers.length, tone: 'green' },
        { label: 'Pending Accounts', value: pendingUsers.length, tone: 'rust' },
        { label: 'Items Approved', value: verifiedItems, tone: 'gold' },
        { label: 'Items Pending', value: pendingItems, tone: 'rust' },
        { label: 'Items Rejected', value: rejectedItems, tone: 'muted' },
      ];
    }

    function renderAnalyticsGraph(data) {
      const maxValue = Math.max(...data.map((entry) => entry.value), 1);

      return `
        <div class="sidebar-analytics-chart" aria-label="Administrative analytics chart">
          ${data.map((entry) => {
            const width = entry.value === 0 ? 0 : Math.max(8, Math.round((entry.value / maxValue) * 100));
            return `
              <div class="analytics-bar-row">
                <div class="analytics-bar-head">
                  <span class="analytics-bar-label">${escapeHtml(entry.label)}</span>
                  <span class="analytics-bar-value">${entry.value}</span>
                </div>
                <div class="analytics-bar-track">
                  <div class="analytics-bar-fill ${entry.tone}" style="width:${width}%;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function defaultViewForRole(role) {
      const normalized = normalizeRole(role);
      if (normalized === 'admin') return 'admin-pending';
      if (normalized === 'verifier') return 'verifier-pending';
      return 'collector-all';
    }

    function isViewAllowed(role, view) {
      const normalized = normalizeRole(role);
      const allowedByRole = {
        admin: ['admin-all', 'admin-pending', 'admin-approved', 'admin-rejected', 'pending-users', 'approved-users'],
        verifier: ['verifier-all', 'verifier-pending', 'verifier-verified', 'verifier-rejected'],
        collector: ['collector-all', 'collector-pending', 'collector-verified', 'collector-rejected'],
      };

      return (allowedByRole[normalized] || []).includes(view);
    }

    function setDashboardView(view) {
      if (!dashboardState.user) return;
      if (!isViewAllowed(dashboardState.user.role, view)) return;

      dashboardState.activeView = view;
      renderDashboard(
        dashboardState.user,
        dashboardState.items,
        dashboardState.health,
        dashboardState.pendingUsers,
        dashboardState.approvedUsers,
        false
      );
    }

    function filterItemsByView(items, role, view) {
      const normalizedRole = normalizeRole(role);

      if (normalizedRole === 'admin') {
        if (view === 'admin-pending') return items.filter((item) => ['pending', 'in_progress'].includes(String(item.verificationStatus || item.status || '').toLowerCase()));
        if (view === 'admin-approved') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'verified');
        if (view === 'admin-rejected') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'rejected');
        return items;
      }

      if (normalizedRole === 'verifier') {
        if (view === 'verifier-pending') return items.filter((item) => ['pending', 'in_progress'].includes(String(item.verificationStatus || item.status || '').toLowerCase()));
        if (view === 'verifier-verified') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'verified');
        if (view === 'verifier-rejected') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'rejected');
        return items;
      }

      if (normalizedRole === 'collector') {
        if (view === 'collector-pending') return items.filter((item) => ['pending', 'in_progress'].includes(String(item.verificationStatus || item.status || '').toLowerCase()));
        if (view === 'collector-verified') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'verified');
        if (view === 'collector-rejected') return items.filter((item) => String(item.verificationStatus || item.status || '').toLowerCase() === 'rejected');
        return items;
      }

      return items;
    }

    function renderSidebar(user, items, pendingUsers, approvedUsers) {
      const role = normalizeRole(user.role);
      const totalItems = items.length;
      const pendingItems = countByStatus(items, ['pending', 'in_progress']);
      const verifiedItems = countByStatus(items, ['verified']);
      const rejectedItems = countByStatus(items, ['rejected']);
      const activeUsers = approvedUsers.length;
      const totalApprovedItems = verifiedItems;
      const totalPendingItems = pendingItems;
      const totalRejectedItems = rejectedItems;
      const adminAnalytics = buildAdminAnalytics(items, pendingUsers, approvedUsers);

      const roleLabel = role === 'admin' ? 'Administrator' : role === 'verifier' ? 'Verifier' : 'Collector';
      const activeView = dashboardState.activeView;
      const activeClass = (view) => activeView === view ? ' active' : '';

      const roleSection = role === 'admin'
        ? `
          <div class="sidebar-section-label">Items</div>
          <div class="sidebar-section">
            <a class="sidebar-item${activeClass('admin-all')}" href="#" onclick="setDashboardView('admin-all'); return false;">
              <span>📦</span> All Items
              <span class="sidebar-count">${totalItems}</span>
            </a>
            <a class="sidebar-item${activeClass('admin-pending')}" href="#" onclick="setDashboardView('admin-pending'); return false;">
              <span>🟡</span> Pending
              <span class="sidebar-count rust">${pendingItems}</span>
            </a>
            <a class="sidebar-item${activeClass('admin-approved')}" href="#" onclick="setDashboardView('admin-approved'); return false;">
              <span>✅</span> Approved
              <span class="sidebar-count green">${verifiedItems}</span>
            </a>
            <a class="sidebar-item${activeClass('admin-rejected')}" href="#" onclick="setDashboardView('admin-rejected'); return false;">
              <span>❌</span> Rejected
              <span class="sidebar-count">${rejectedItems}</span>
            </a>
          </div>
          <div class="sidebar-section-label">Accounts</div>
          <div class="sidebar-section">
            <a class="sidebar-item${activeClass('pending-users')}" href="#" onclick="setDashboardView('pending-users'); return false;">
              <span>🧾</span> Pending Accounts
              <span class="sidebar-count rust">${pendingUsers.length}</span>
            </a>
            <a class="sidebar-item${activeClass('approved-users')}" href="#" onclick="setDashboardView('approved-users'); return false;">
              <span>✅</span> Approved Accounts
              <span class="sidebar-count green">${approvedUsers.length}</span>
            </a>
          </div>
          <div class="sidebar-section-label">Analytics</div>
          <div class="sidebar-section">
            <div class="sidebar-analytics-card">
              <div class="sidebar-analytics-title">Platform Summary</div>
              <div class="sidebar-analytics-subtitle">Live overview of users and item review status.</div>
              ${renderAnalyticsGraph(adminAnalytics)}
            </div>
            <div class="sidebar-item sidebar-item-static">
              <span>👥</span> Active Users
              <span class="sidebar-count green">${activeUsers}</span>
            </div>
            <div class="sidebar-item sidebar-item-static">
              <span>✅</span> Items Approved
              <span class="sidebar-count green">${totalApprovedItems}</span>
            </div>
            <div class="sidebar-item sidebar-item-static">
              <span>⏳</span> Items Pending
              <span class="sidebar-count rust">${totalPendingItems}</span>
            </div>
            <div class="sidebar-item sidebar-item-static">
              <span>❌</span> Items Rejected
              <span class="sidebar-count">${totalRejectedItems}</span>
            </div>
          </div>
        `
        : role === 'verifier' ? `
          <div class="sidebar-section-label">Submitted Items</div>
          <div class="sidebar-section">
            <a class="sidebar-item${activeClass('verifier-all')}" href="#" onclick="setDashboardView('verifier-all'); return false;">
              <span>📦</span> All Submissions
              <span class="sidebar-count">${totalItems}</span>
            </a>
            <a class="sidebar-item${activeClass('verifier-pending')}" href="#" onclick="setDashboardView('verifier-pending'); return false;">
              <span>🟡</span> Awaiting Decision
              <span class="sidebar-count rust">${pendingItems}</span>
            </a>
            <a class="sidebar-item${activeClass('verifier-verified')}" href="#" onclick="setDashboardView('verifier-verified'); return false;">
              <span>📜</span> Verified
              <span class="sidebar-count green">${verifiedItems}</span>
            </a>
            <a class="sidebar-item${activeClass('verifier-rejected')}" href="#" onclick="setDashboardView('verifier-rejected'); return false;">
              <span>❌</span> Declined
              <span class="sidebar-count">${rejectedItems}</span>
            </a>
          </div>
        ` : `
          <div class="sidebar-section-label">My Items</div>
          <div class="sidebar-section">
            <a class="sidebar-item${activeClass('collector-all')}" href="#" onclick="setDashboardView('collector-all'); return false;">
              <span>📦</span> My Submissions
              <span class="sidebar-count">${totalItems}</span>
            </a>
            <a class="sidebar-item${activeClass('collector-pending')}" href="#" onclick="setDashboardView('collector-pending'); return false;">
              <span>🟡</span> In Review
              <span class="sidebar-count rust">${pendingItems}</span>
            </a>
            <a class="sidebar-item${activeClass('collector-verified')}" href="#" onclick="setDashboardView('collector-verified'); return false;">
              <span>📜</span> Verified
              <span class="sidebar-count green">${verifiedItems}</span>
            </a>
            <a class="sidebar-item${activeClass('collector-rejected')}" href="#" onclick="setDashboardView('collector-rejected'); return false;">
              <span>❌</span> Rejected
              <span class="sidebar-count">${rejectedItems}</span>
            </a>
          </div>
        `;

      return `
        <div class="dashboard-sidebar">
          <div class="sidebar-profile">
            <div class="sidebar-name">${escapeHtml(user.username || user.email || 'AntiqChain User')}</div>
            <div class="sidebar-role">${escapeHtml(roleLabel)} account</div>
          </div>
          ${roleSection}
          <div class="sidebar-section-label">Actions</div>
          <div class="sidebar-section">
            <a class="sidebar-item" href="submit.html"><span>➕</span> Submit New Item</a>
            <a class="sidebar-item" href="../index.html"><span>🏠</span> Back to Home</a>
          </div>
        </div>
      `;
    }

    function renderStats(role, items, pendingUsers, approvedUsers) {
      const pendingItems = countByStatus(items, ['pending', 'in_progress']);
      const verifiedItems = countByStatus(items, ['verified']);
      const rejectedItems = countByStatus(items, ['rejected']);
      const blockchainLinked = items.filter((item) => item.blockchainHash || item.blockchainTransactionHash).length;
      const activeUsers = approvedUsers.length;

      if (role === 'admin') {
        return `
          <div class="dash-stats">
            <div class="dash-stat"><div class="dash-stat-num green">${activeUsers}</div><div class="dash-stat-label">Active Users</div></div>
            <div class="dash-stat"><div class="dash-stat-num rust">${pendingUsers.length}</div><div class="dash-stat-label">Pending Accounts</div></div>
            <div class="dash-stat"><div class="dash-stat-num gold">${verifiedItems}</div><div class="dash-stat-label">Items Approved</div></div>
            <div class="dash-stat"><div class="dash-stat-num">${rejectedItems}</div><div class="dash-stat-label">Items Rejected</div></div>
          </div>
        `;
      }

      if (role === 'verifier') {
        return `
          <div class="dash-stats">
            <div class="dash-stat"><div class="dash-stat-num gold">${items.length}</div><div class="dash-stat-label">All Submitted Items</div></div>
            <div class="dash-stat"><div class="dash-stat-num rust">${pendingItems}</div><div class="dash-stat-label">Awaiting Decision</div></div>
            <div class="dash-stat"><div class="dash-stat-num green">${verifiedItems}</div><div class="dash-stat-label">Approved Items</div></div>
            <div class="dash-stat"><div class="dash-stat-num">${rejectedItems}</div><div class="dash-stat-label">Declined Items</div></div>
          </div>
        `;
      }

      return `
        <div class="dash-stats">
          <div class="dash-stat"><div class="dash-stat-num gold">${items.length}</div><div class="dash-stat-label">All Submitted Items</div></div>
          <div class="dash-stat"><div class="dash-stat-num rust">${pendingItems}</div><div class="dash-stat-label">In Review</div></div>
          <div class="dash-stat"><div class="dash-stat-num green">${verifiedItems}</div><div class="dash-stat-label">Verified</div></div>
          <div class="dash-stat"><div class="dash-stat-num">${blockchainLinked}</div><div class="dash-stat-label">Blockchain Proofs</div></div>
        </div>
      `;
    }

    function renderItemRows(items, role) {
      if (!items.length) {
        return `
          <tr>
            <td colspan="7" style="text-align:center; padding:30px; color:var(--ink-light);">
              No submitted items found.
            </td>
          </tr>
        `;
      }

      return items.map((item) => {
        const title = item.title || item.itemName || item.name || 'Untitled Item';
        const category = item.category || 'Antique Item';
        const period = item.estimatedPeriod || item.year || 'Period not provided';
        const status = item.verificationStatus || item.status || 'pending';
        const certificateHash = item.blockchainHash || 'Pending';
        const txHash = item.blockchainTransactionHash || 'Pending';
        const ownerName = item.owner?.username || item.owner?.email || 'Unknown owner';
        const normalizedRole = normalizeRole(role);
        const canDecide = normalizedRole === 'verifier' && ['pending', 'in_progress'].includes(String(status).toLowerCase());

        const verifierActions = canDecide
          ? `
            <div class="table-actions">
              <button class="btn-sm btn-approve" onclick="changeItemStatus('${item._id}', 'verified')">Approve</button>
              <button class="btn-sm btn-decline" onclick="changeItemStatus('${item._id}', 'rejected')">Decline</button>
            </div>
          `
          : `<button class="btn-sm btn-review" onclick="window.location.href='detail.html?id=${item._id}'">View</button>`;

        return `
          <tr>
            <td class="item-row-thumb">🏺</td>
            <td>
              <div class="item-row-title">${escapeHtml(title)}</div>
              <div class="item-row-sub">${escapeHtml(category)} · ${escapeHtml(period)}</div>
              <div class="item-row-sub">Owner: ${escapeHtml(ownerName)}</div>
            </td>
            <td>${getStatusBadge(status)}</td>
            <td style="font-size:13px;color:var(--ink-light);">${escapeHtml(certificateHash)}</td>
            <td style="font-size:13px;color:var(--ink-light);">${escapeHtml(txHash)}</td>
            <td>${verifierActions}</td>
          </tr>
        `;
      }).join('');
    }

    function renderApprovedUsersRows(approvedUsers) {
      if (!approvedUsers.length) {
        return `
          <tr>
            <td colspan="4" style="text-align:center; padding:30px; color:var(--ink-light);">No approved accounts found.</td>
          </tr>
        `;
      }

      return approvedUsers.map((account) => {
        const role = normalizeRole(account.role);
        return `
          <tr>
            <td>${escapeHtml(account.username || 'Unknown')}</td>
            <td>${escapeHtml(account.email || '')}</td>
            <td>${escapeHtml(role)}</td>
            <td>${getStatusBadge(account.status || 'approved')}</td>
          </tr>
        `;
      }).join('');
    }

    function renderPendingUsersRows(pendingUsers) {
      if (!pendingUsers.length) {
        return `
          <tr>
            <td colspan="5" style="text-align:center; padding:30px; color:var(--ink-light);">No accounts are waiting for approval.</td>
          </tr>
        `;
      }

      return pendingUsers.map((account) => {
        const role = normalizeRole(account.role);
        return `
          <tr>
            <td>${escapeHtml(account.username || 'Unknown')}</td>
            <td>${escapeHtml(account.email || '')}</td>
            <td>${escapeHtml(role)}</td>
            <td>${getStatusBadge(account.status || 'pending')}</td>
            <td>
              <div class="table-actions">
                <button class="btn-sm btn-approve" onclick="approveAccount('${account._id}')">Approve</button>
                <button class="btn-sm btn-decline" onclick="rejectAccount('${account._id}')">Reject</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderRolePanel(role, items, pendingUsers) {
      if (role === 'admin') {
        const showAccountReview = dashboardState.activeView === 'pending-users' || dashboardState.activeView === 'approved-users';

        if (showAccountReview) {
          const showApproved = dashboardState.activeView === 'approved-users';
          const title = showApproved ? 'Approved Accounts' : 'Account Approval Queue';
          const subtitle = showApproved
            ? 'These accounts are active and can sign in.'
            : 'Approve or reject new account registrations before they become active.';

          return `
            <div class="dash-content dashboard-grid dashboard-grid-single">
              <section class="dashboard-panel dashboard-panel-wide">
                <div class="panel-head">
                  <div>
                    <h3>${title}</h3>
                    <p>${subtitle}</p>
                  </div>
                  <button class="btn-sm btn-review" onclick="loadDashboardData()">Refresh</button>
                </div>
                <div class="panel-body">
                  <table class="review-table">
                    <thead>
                      <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Requested Role</th>
                        <th>Status</th>
                        ${showApproved ? '' : '<th>Action</th>'}
                      </tr>
                    </thead>
                    <tbody>${showApproved ? renderApprovedUsersRows(dashboardState.approvedUsers) : renderPendingUsersRows(pendingUsers)}</tbody>
                  </table>
                </div>
              </section>
            </div>
          `;
        }

        const filteredItems = filterItemsByView(items, role, dashboardState.activeView);
        const title = dashboardState.activeView === 'admin-rejected'
          ? 'Rejected Items'
          : dashboardState.activeView === 'admin-approved'
            ? 'Approved Items'
            : dashboardState.activeView === 'admin-pending'
              ? 'Pending Items'
              : 'All Items';
        const subtitle = 'Admin item view is read-only. Use the sidebar to review item status without approving or rejecting items directly.';

        return `
          <div class="dash-content dashboard-grid dashboard-grid-single">
            <section class="dashboard-panel dashboard-panel-wide">
              <div class="panel-head">
                <div>
                  <h3>${title}</h3>
                  <p>${subtitle}</p>
                </div>
                <button class="btn-sm btn-review" onclick="loadDashboardData()">Refresh</button>
              </div>
              <div class="panel-body">
                <table class="review-table">
                  <thead>
                    <tr>
                      <th></th>
                      <th>Item</th>
                      <th>Status</th>
                      <th>Certificate Hash</th>
                      <th>Transaction Hash</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>${renderItemRows(filteredItems, 'admin')}</tbody>
                </table>
              </div>
            </section>
          </div>
        `;
      }

      const filteredItems = filterItemsByView(items, role, dashboardState.activeView);
      const title = role === 'verifier' ? 'Submitted Items + Decision Actions' : 'All Submitted Items';
      const subtitle = role === 'verifier'
        ? 'Review each submission and approve or decline pending items.'
        : 'Collector view shows only your submitted items and their verification progress.';

      return `
        <div class="dash-content dashboard-grid dashboard-grid-single">
          <section class="dashboard-panel dashboard-panel-wide">
            <div class="panel-head">
              <div>
                <h3>${title}</h3>
                <p>${subtitle}</p>
              </div>
              <button class="btn-sm btn-review" onclick="loadDashboardData()">Refresh</button>
            </div>
            <div class="panel-body">
              <table class="review-table">
                <thead>
                  <tr>
                    <th></th>
                    <th>Item</th>
                    <th>Status</th>
                    <th>Certificate Hash</th>
                    <th>Transaction Hash</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>${renderItemRows(filteredItems, role)}</tbody>
              </table>
            </div>
          </section>
        </div>
      `;
    }

    function renderDashboard(user, items, health, pendingUsers, approvedUsers, showWelcome = false) {
      const root = document.getElementById('dashboard-root');
      const role = normalizeRole(user.role);
      dashboardCurrentRole = role;

      const heading = role === 'admin'
        ? 'Admin Dashboard'
        : role === 'verifier'
          ? 'Verifier Dashboard'
          : 'Collector Dashboard';

      const subheading = role === 'admin'
        ? 'Manage account approvals and monitor system activity.'
        : role === 'verifier'
          ? 'Review submitted items and record approval decisions.'
          : 'Browse all submitted antiques and track their verification status.';

      root.innerHTML = `
        ${renderSidebar(user, items, pendingUsers, approvedUsers)}
        <div class="dashboard-main">
          <div class="dash-topbar">
            <div>
              <h2>${heading}</h2>
              <p>${subheading}</p>
            </div>
            <div class="dash-topbar-actions">
              ${getHealthBadge(health)}
              <a class="btn-primary" style="font-size:13px;padding:10px 20px;" href="submit.html">Submit New Item</a>
            </div>
          </div>
          ${renderStats(role, items, pendingUsers, approvedUsers)}
          ${renderRolePanel(role, items, pendingUsers)}
        </div>
      `;

      if (showWelcome) {
        showWelcomeBanner(user);
      }
    }

    function stopDashboardAutoRefresh() {
      if (dashboardRefreshTimer) {
        clearInterval(dashboardRefreshTimer);
        dashboardRefreshTimer = null;
      }
    }

    function startDashboardAutoRefresh() {
      stopDashboardAutoRefresh();

      if (!session || dashboardCurrentRole !== 'admin') {
        return;
      }

      dashboardRefreshTimer = setInterval(() => {
        if (document.visibilityState === 'visible') {
          loadDashboardData({ silent: true });
        }
      }, 15000);
    }

    async function changeItemStatus(itemId, verificationStatus) {
      try {
        await apiRequest(`/items/${itemId}/verification-status`, 'PUT', { verificationStatus }, true);
        showToast(`Item ${verificationStatus === 'verified' ? 'approved' : 'declined'} successfully.`);
        loadDashboardData();
      } catch (error) {
        showToast(error.message || 'Unable to update item status.', true);
      }
    }

    async function approveAccount(userId) {
      try {
        await apiRequest(`/auth/approve-user/${userId}`, 'PUT', null, true);
        showToast('User account approved.');
        loadDashboardData();
      } catch (error) {
        showToast(error.message || 'Unable to approve account.', true);
      }
    }

    async function rejectAccount(userId) {
      try {
        await apiRequest(`/auth/reject-user/${userId}`, 'PUT', null, true);
        showToast('User account rejected.');
        loadDashboardData();
      } catch (error) {
        showToast(error.message || 'Unable to reject account.', true);
      }
    }

    async function loadDashboardData(options = {}) {
      const silent = options.silent === true;
      if (!session) return;

      if (!silent) {
        renderLoading();
      }

      try {
        const userResponse = await apiRequest('/auth/me', 'GET', null, true);
        const user = userResponse.user || userResponse.data || userResponse || session;
        user.role = normalizeRole(user.role);

        const itemsEndpoint = user.role === 'collector' ? '/items/my-items' : '/items';
        const itemsResponse = await apiRequest(itemsEndpoint, 'GET', null, true);
        const healthResponse = await getBackendHealth();

        let pendingUsers = [];
        let approvedUsers = [];

        if (user.role === 'admin') {
          const pendingResponse = await apiRequest('/auth/pending-users', 'GET', null, true);
          const approvedResponse = await apiRequest('/auth/approved-users', 'GET', null, true);
          pendingUsers = normalizeUsers(pendingResponse);
          approvedUsers = normalizeUsers(approvedResponse);
        }

        const normalizedItems = normalizeItems(itemsResponse);
        dashboardState.user = user;
        dashboardState.items = normalizedItems;
        dashboardState.pendingUsers = pendingUsers;
        dashboardState.approvedUsers = approvedUsers;
        dashboardState.health = healthResponse || null;

        if (!dashboardState.activeView || !isViewAllowed(user.role, dashboardState.activeView)) {
          dashboardState.activeView = defaultViewForRole(user.role);
        }

        renderDashboard(
          user,
          normalizedItems,
          healthResponse || null,
          pendingUsers,
          approvedUsers,
          !dashboardState.welcomeShown
        );

        dashboardState.welcomeShown = true;

        startDashboardAutoRefresh();
      } catch (error) {
        if (!silent) {
          renderError(error.message || 'Unable to load dashboard data.');
        }
        showToast(error.message || 'Unable to load dashboard data.', true);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      if (session) loadDashboardData();
    });

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && session && dashboardCurrentRole === 'admin') {
        loadDashboardData({ silent: true });
      }
    });

    window.addEventListener('beforeunload', stopDashboardAutoRefresh);
  </script>

</body>
</html>
